<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dgames</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="auth-screen" class="screen hidden">
    <div class="card auth-card">
      <div class="logo"><span class="logo-d">D</span><span class="logo-games">games</span></div>
      <div class="tabs">
        <button class="tab active" data-tab="login">Connexion</button>
        <button class="tab"        data-tab="register">Inscription</button>
      </div>
      <form id="auth-form">
        <div class="field">
          <label for="username">Identifiant</label>
          <input id="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <p id="auth-error" class="error hidden"></p>
        <button type="submit" id="auth-btn">Connexion</button>
      </form>
    </div>
  </div>

  <div id="portal-screen" class="screen hidden">
    <header>
      <div class="logo"><span class="logo-d">D</span><span class="logo-games">games</span></div>
      <div class="header-right">
        <a id="admin-link" href="/admin" class="admin-link hidden">Admin</a>
        <a href="/profile" class="avatar-link" id="avatar-link" title="Profil"></a>
        <button id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <main>
      <p class="subtitle">Choisissez votre jeu</p>
      <div class="game-grid" id="game-grid"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
